<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1e3a8a">
<title>出席クイック</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #334155;
    --accent: #3b82f6;
    --accent-strong: #2563eb;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --ok: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    max-width: 720px; margin: 0 auto;
  }
  header {
    padding: 20px 20px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  h1 { font-size: 20px; margin: 0; letter-spacing: 0.02em; }
  .tabs {
    display: flex; gap: 4px; padding: 0 16px 12px;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .tabs button {
    flex: 1; padding: 10px 0;
    background: var(--panel); color: var(--muted);
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .tabs button.active { background: var(--accent); color: white; }
  main { padding: 4px 16px 80px; }

  .card {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .now-card {
    background: linear-gradient(135deg, var(--accent-strong), #4f46e5);
    padding: 20px;
  }
  .now-label {
    font-size: 12px; opacity: 0.85;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .now-title { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
  .now-meta { font-size: 13px; opacity: 0.85; margin-bottom: 16px; }
  .big-btn {
    display: block; width: 100%;
    background: white; color: var(--accent-strong);
    padding: 18px; border-radius: 12px;
    text-align: center; text-decoration: none;
    font-size: 17px; font-weight: 700;
    border: none; cursor: pointer;
    transition: transform 0.08s;
  }
  .big-btn:active { transform: scale(0.98); }

  .empty {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }

  .list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px; background: var(--panel);
    border-radius: var(--radius); margin-bottom: 8px;
    text-decoration: none; color: var(--text);
  }
  .list-item.past { opacity: 0.5; }
  .list-item.current { border: 2px solid var(--accent); }
  .list-period {
    background: var(--panel-2);
    width: 48px; height: 48px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; flex-shrink: 0;
  }
  .list-main { flex: 1; min-width: 0; }
  .list-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sub { font-size: 12px; color: var(--muted); }
  .list-link {
    background: var(--accent); color: white;
    padding: 8px 12px; border-radius: 8px;
    text-decoration: none; font-size: 13px; font-weight: 600;
    white-space: nowrap;
  }

  .section-title {
    font-size: 13px; font-weight: 600; color: var(--muted);
    margin: 16px 4px 8px; text-transform: uppercase; letter-spacing: 0.08em;
  }

  .grid {
    display: grid;
    gap: 4px;
  }
  .grid .head {
    text-align: center; font-size: 12px; color: var(--muted);
    padding: 6px 0; font-weight: 600;
  }
  .grid .cell {
    background: var(--panel); border-radius: 8px;
    padding: 6px 3px; min-height: 52px;
    font-size: 11px; text-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text); border: none; cursor: pointer;
  }
  .grid .cell.filled { background: var(--accent-strong); color: white; }
  .grid .cell.empty-cell { background: var(--panel); color: var(--muted); font-size: 18px; }
  .grid .cell-name { font-weight: 600; line-height: 1.2; word-break: break-all; }
  .grid .cell-room { font-size: 10px; opacity: 0.8; margin-top: 2px; }

  form { display: flex; flex-direction: column; gap: 10px; }
  label { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
  input, select {
    width: 100%; padding: 12px; border-radius: 10px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid transparent; font-size: 15px;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn {
    padding: 12px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    background: var(--accent); color: white;
  }
  .btn.secondary { background: var(--panel-2); color: var(--text); }
  .btn.danger { background: var(--danger); color: white; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row > * { flex: 1; }

  dialog {
    background: var(--panel); color: var(--text);
    border: none; border-radius: var(--radius);
    padding: 20px; max-width: 92vw; width: 400px;
  }
  dialog::backdrop { background: rgba(0,0,0,0.6); }
  dialog h2 { margin: 0 0 14px; font-size: 18px; }

  .period-row {
    display: grid; grid-template-columns: 30px 1fr 1fr;
    gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .period-row span { color: var(--muted); font-size: 14px; text-align: center; }

  .footer-note {
    text-align: center; color: var(--muted);
    font-size: 11px; margin-top: 24px; padding: 12px;
  }
  a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>出席クイック</h1>
  <span id="clock" style="font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;"></span>
</header>
<nav class="tabs">
  <button data-tab="today" class="active">今日</button>
  <button data-tab="week">時間割</button>
  <button data-tab="settings">設定</button>
</nav>
<main>
  <section id="tab-today"></section>
  <section id="tab-week" hidden></section>
  <section id="tab-settings" hidden></section>
</main>

<dialog id="import-dialog">
  <h2>Excelからインポート</h2>
  <div id="import-body">
    <p style="color:var(--muted);font-size:13px;margin:0 0 12px;">
      千葉工大の学生時間割表（.xlsx）を読み込みます。
    </p>
    <input type="file" id="import-file" accept=".xlsx" style="margin-bottom:12px;">
    <div id="import-result" hidden>
      <div class="card" style="background:var(--panel-2);margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;padding:6px 0;">
          <span>前期</span><span id="front-count">—</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid rgba(255,255,255,0.1);">
          <span>後期</span><span id="back-count">—</span>
        </div>
      </div>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:8px;cursor:pointer;">
        <input type="radio" name="term" value="front" checked> 前期をインポート
      </label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:8px;cursor:pointer;">
        <input type="radio" name="term" value="back"> 後期をインポート
      </label>
      <div style="font-size:12px;color:var(--warn);margin:4px 0 12px;">
        ⚠ 既存の時間割は置き換えられます
      </div>
    </div>
    <div id="import-error" style="color:var(--danger);font-size:13px;margin-bottom:8px;" hidden></div>
  </div>
  <div class="btn-row">
    <button type="button" class="btn secondary" id="import-cancel">閉じる</button>
    <button type="button" class="btn" id="import-confirm" disabled>インポート</button>
  </div>
</dialog>

<dialog id="class-dialog">
  <h2 id="dialog-title">講義を追加</h2>
  <form id="class-form">
    <label>講義名
      <input type="text" name="name" required maxlength="40" placeholder="例: プログラミング基礎">
    </label>
    <div class="form-row">
      <label>曜日
        <select name="day" required>
          <option value="1">月</option>
          <option value="2">火</option>
          <option value="3">水</option>
          <option value="4">木</option>
          <option value="5">金</option>
          <option value="6">土</option>
          <option value="0">日</option>
        </select>
      </label>
      <label>時限
        <select name="period" required></select>
      </label>
    </div>
    <label>教室番号（空欄可）
      <input type="text" name="room" maxlength="30" placeholder="例: 5202">
    </label>
    <div class="btn-row" style="margin-top:8px;">
      <button type="button" class="btn secondary" id="dialog-cancel">キャンセル</button>
      <button type="button" class="btn danger" id="dialog-delete" hidden>削除</button>
      <button type="submit" class="btn">保存</button>
    </div>
  </form>
</dialog>

<script>
  const ATTENDANCE_URL = 'https://attendance.is.it-chiba.ac.jp/attendance/class_room/';
  const STORAGE_KEY = 'attendance-app-v1';
  const DAY_NAMES = ['日', '月', '火', '水', '木', '金', '土'];
  const DEFAULT_PERIODS = [
    { id: 1, start: '09:00', end: '10:00' },
    { id: 2, start: '10:00', end: '11:00' },
    { id: 3, start: '11:00', end: '12:00' },
    { id: 4, start: '12:00', end: '13:00' },
    { id: 5, start: '13:00', end: '14:00' },
    { id: 6, start: '14:00', end: '15:00' },
    { id: 7, start: '15:00', end: '16:00' },
    { id: 8, start: '16:00', end: '17:00' },
    { id: 9, start: '17:00', end: '18:00' },
    { id: 10, start: '18:00', end: '19:00' },
  ];

  function loadState() {
    let migrated = false;
    const result = { periods: [...DEFAULT_PERIODS], classes: [], showSaturday: false };
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        if (Array.isArray(s.periods) && s.periods.length === 10) result.periods = s.periods;
        else if (Array.isArray(s.periods)) migrated = true;
        if (Array.isArray(s.classes)) result.classes = s.classes;
        if (typeof s.showSaturday === 'boolean') result.showSaturday = s.showSaturday;
      }
    } catch {}
    if (migrated) localStorage.setItem(STORAGE_KEY, JSON.stringify(result));
    return result;
  }
  function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  let state = loadState();

  function uid() { return Math.random().toString(36).slice(2, 10); }
  function timeToMin(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }
  function nowMin(d = new Date()) { return d.getHours() * 60 + d.getMinutes(); }
  function periodById(id) { return state.periods.find(p => p.id === id); }

  function dayClassesSorted(day) {
    return state.classes
      .filter(c => c.day === day)
      .map(c => ({ ...c, _p: periodById(c.period) }))
      .filter(c => c._p)
      .sort((a, b) => timeToMin(a._p.start) - timeToMin(b._p.start));
  }
  function mergeConsecutive(list) {
    const merged = [];
    for (const c of list) {
      const last = merged[merged.length - 1];
      if (
        last &&
        last.name === c.name &&
        last.room === c.room &&
        last._endP.id + 1 === c._p.id &&
        timeToMin(last._endP.end) === timeToMin(c._p.start)
      ) {
        last._endP = c._p;
        last.endPeriod = c.period;
        last.periodSpan += 1;
        last.ids.push(c.id);
        continue;
      }
      merged.push({
        ...c,
        startPeriod: c.period,
        endPeriod: c.period,
        _startP: c._p,
        _endP: c._p,
        periodSpan: 1,
        ids: [c.id],
      });
    }
    return merged;
  }
  function todayMergedSorted(date = new Date()) {
    return mergeConsecutive(dayClassesSorted(date.getDay()));
  }
  function findCurrentMerged(date = new Date()) {
    const min = nowMin(date);
    return todayMergedSorted(date).find(m =>
      min >= timeToMin(m._startP.start) && min < timeToMin(m._endP.end)
    ) || null;
  }
  function findNextMerged(date = new Date()) {
    const min = nowMin(date);
    return todayMergedSorted(date).find(m => timeToMin(m._startP.start) > min) || null;
  }
  function periodLabel(m) {
    return m.startPeriod === m.endPeriod ? `${m.startPeriod}限` : `${m.startPeriod}-${m.endPeriod}限`;
  }

  function attendanceLink(room) {
    return ATTENDANCE_URL + encodeURIComponent(room);
  }

  function fmtPeriod(p) { return `${p.id}限 ${p.start}〜${p.end}`; }

  // ====== Rendering ======
  function renderToday() {
    const root = document.getElementById('tab-today');
    const current = findCurrentMerged();
    const next = findNextMerged();
    const today = todayMergedSorted();
    const now = new Date();
    const nowM = nowMin(now);

    let html = '';

    if (current) {
      const btn = current.room
        ? `<a class="big-btn" href="${attendanceLink(current.room)}" target="_blank" rel="noopener">出席サイトを開く →</a>`
        : `<div class="big-btn" style="background:#e5e7eb;color:#6b7280;cursor:not-allowed;">教室番号が未設定です</div>`;
      html += `
        <div class="card now-card">
          <div class="now-label">今の講義</div>
          <h2 class="now-title">${escapeHtml(current.name)}</h2>
          <div class="now-meta">${periodLabel(current)} ${current._startP.start}〜${current._endP.end} ・ 教室 ${escapeHtml(current.room || '未設定')}</div>
          ${btn}
        </div>`;
    } else if (next) {
      const btn = next.room
        ? `<a class="big-btn" href="${attendanceLink(next.room)}" target="_blank" rel="noopener">出席サイトを開く →</a>`
        : `<div class="big-btn" style="background:#e5e7eb;color:#6b7280;cursor:not-allowed;">教室番号が未設定です</div>`;
      html += `
        <div class="card now-card" style="background:linear-gradient(135deg,#475569,#334155);">
          <div class="now-label">次の講義</div>
          <h2 class="now-title">${escapeHtml(next.name)}</h2>
          <div class="now-meta">${periodLabel(next)} ${next._startP.start}〜${next._endP.end} ・ 教室 ${escapeHtml(next.room || '未設定')}</div>
          ${btn}
        </div>`;
    } else {
      html += `<div class="card"><div class="empty">${today.length ? '本日の講義は終了しました' : '今日は講義がありません'}</div></div>`;
    }

    html += `<div class="section-title">${DAY_NAMES[now.getDay()]}曜日の時間割</div>`;
    if (today.length === 0) {
      html += `<div class="card"><div class="empty">登録された講義はありません<br><br><a href="#" onclick="switchTab('settings');return false;">設定から追加</a></div></div>`;
    } else {
      html += today.map(m => {
        const pm = timeToMin(m._startP.start);
        const em = timeToMin(m._endP.end);
        let cls = 'list-item';
        if (em <= nowM) cls += ' past';
        else if (pm <= nowM && em > nowM) cls += ' current';
        const link = m.room
          ? `<a class="list-link" href="${attendanceLink(m.room)}" target="_blank" rel="noopener">開く</a>`
          : `<span class="list-link" style="background:var(--panel-2);color:var(--muted);">未設定</span>`;
        const badge = m.startPeriod === m.endPeriod
          ? `${m.startPeriod}`
          : `${m.startPeriod}-${m.endPeriod}`;
        const badgeStyle = m.periodSpan > 1 ? 'style="font-size:14px;"' : '';
        return `
          <div class="${cls}">
            <div class="list-period" ${badgeStyle}>${badge}</div>
            <div class="list-main">
              <div class="list-name">${escapeHtml(m.name)}</div>
              <div class="list-sub">${m._startP.start}〜${m._endP.end} ・ ${escapeHtml(m.room || '教室未設定')}</div>
            </div>
            ${link}
          </div>`;
      }).join('');
    }
    root.innerHTML = html;
  }

  function renderWeek() {
    const root = document.getElementById('tab-week');
    const days = state.showSaturday ? [1, 2, 3, 4, 5, 6] : [1, 2, 3, 4, 5];
    const periods = state.periods;

    const dayMerged = {};
    for (const d of days) dayMerged[d] = mergeConsecutive(dayClassesSorted(d));

    const periodIndex = {};
    periods.forEach((p, i) => { periodIndex[p.id] = i; });

    const gridStyle = `grid-template-columns: 40px repeat(${days.length}, 1fr);`;
    let html = `<div class="grid" style="${gridStyle}">`;
    html += `<div class="head" style="grid-row:1;grid-column:1;"></div>`;
    days.forEach((d, di) => {
      html += `<div class="head" style="grid-row:1;grid-column:${di + 2};">${DAY_NAMES[d]}</div>`;
    });
    periods.forEach((p, pi) => {
      html += `<div class="head" style="grid-row:${pi + 2};grid-column:1;">${p.id}</div>`;
    });

    for (const d of days) {
      const di = days.indexOf(d);
      const col = di + 2;
      const covered = new Set();
      for (const m of dayMerged[d]) {
        const startIdx = periodIndex[m.startPeriod];
        if (startIdx == null) continue;
        const row = startIdx + 2;
        const label = m.startPeriod === m.endPeriod
          ? `${m.startPeriod}限`
          : `${m.startPeriod}-${m.endPeriod}限`;
        html += `<button class="cell filled" data-edit="${m.id}" style="grid-row:${row} / span ${m.periodSpan};grid-column:${col};">
          <div class="cell-name">${escapeHtml(m.name)}</div>
          <div class="cell-room">${escapeHtml(m.room)}</div>
          ${m.periodSpan > 1 ? `<div class="cell-room" style="opacity:0.7;">${label}</div>` : ''}
        </button>`;
        for (let pid = m.startPeriod; pid <= m.endPeriod; pid++) covered.add(pid);
      }
      periods.forEach((p, pi) => {
        if (covered.has(p.id)) return;
        const row = pi + 2;
        html += `<button class="cell empty-cell" data-add-day="${d}" data-add-period="${p.id}" style="grid-row:${row};grid-column:${col};">+</button>`;
      });
    }

    html += '</div>';
    html += `<div class="footer-note">セルをタップして講義を追加/編集</div>`;
    root.innerHTML = html;

    root.querySelectorAll('[data-edit]').forEach(el => {
      el.addEventListener('click', () => openClassDialog(el.dataset.edit));
    });
    root.querySelectorAll('[data-add-day]').forEach(el => {
      el.addEventListener('click', () => {
        openClassDialog(null, { day: Number(el.dataset.addDay), period: Number(el.dataset.addPeriod) });
      });
    });
  }

  function renderSettings() {
    const root = document.getElementById('tab-settings');
    let html = `
      <div class="section-title">講義の追加</div>
      <div class="card">
        <button class="btn" id="add-class-btn">＋ 新しい講義を追加</button>
        <div style="height:8px"></div>
        <button class="btn secondary" id="import-xlsx-btn">📄 Excelからインポート</button>
      </div>
      <div class="section-title">登録済み講義（${state.classes.length}）</div>`;

    if (state.classes.length === 0) {
      html += `<div class="card"><div class="empty">まだ登録がありません</div></div>`;
    } else {
      const sorted = [...state.classes].sort((a, b) => a.day - b.day || a.period - b.period);
      html += sorted.map(c => {
        const p = periodById(c.period);
        return `
          <div class="list-item" data-edit="${c.id}" style="cursor:pointer;">
            <div class="list-period">${DAY_NAMES[c.day]}${c.period}</div>
            <div class="list-main">
              <div class="list-name">${escapeHtml(c.name)}</div>
              <div class="list-sub">${p ? p.start + '〜' + p.end : '?'} ・ 教室 ${escapeHtml(c.room)}</div>
            </div>
          </div>`;
      }).join('');
    }

    html += `<div class="section-title">表示設定</div>
      <div class="card">
        <label style="display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;margin:0;">
          <span style="color:var(--text);font-size:15px;">土曜授業を表示</span>
          <input type="checkbox" id="toggle-saturday" ${state.showSaturday ? 'checked' : ''} style="width:auto;transform:scale(1.3);">
        </label>
        <div style="font-size:12px;color:var(--muted);margin-top:6px;">
          教職科目など土曜開講の授業がある場合に有効化してください。
        </div>
      </div>`;
    html += `<div class="section-title">データ</div>
      <div class="card">
        <div class="btn-row">
          <button class="btn secondary" id="export-btn">エクスポート</button>
          <button class="btn secondary" id="import-btn">インポート</button>
        </div>
        <div style="height:8px"></div>
        <button class="btn danger" id="reset-btn">全データを削除</button>
      </div>`;
    html += `<div class="footer-note">データはこの端末のブラウザに保存されます（localStorage）</div>`;

    root.innerHTML = html;

    document.getElementById('toggle-saturday').addEventListener('change', (e) => {
      state.showSaturday = e.target.checked;
      saveState();
      renderAll();
    });

    document.getElementById('add-class-btn').addEventListener('click', () => openClassDialog(null));
    document.getElementById('import-xlsx-btn').addEventListener('click', openImportDialog);
    root.querySelectorAll('[data-edit]').forEach(el => {
      el.addEventListener('click', () => openClassDialog(el.dataset.edit));
    });
    document.getElementById('reset-btn').addEventListener('click', () => {
      if (confirm('本当に全データを削除しますか？')) {
        localStorage.removeItem(STORAGE_KEY);
        state = loadState();
        renderAll();
      }
    });
    document.getElementById('export-btn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'attendance-timetable.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });
    document.getElementById('import-btn').addEventListener('click', () => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'application/json';
      inp.onchange = async () => {
        const f = inp.files[0]; if (!f) return;
        try {
          const data = JSON.parse(await f.text());
          if (data.periods && data.classes) {
            state = data; saveState(); renderAll();
            alert('インポートしました');
          } else alert('形式が不正です');
        } catch { alert('読み込みに失敗しました'); }
      };
      inp.click();
    });
  }

  // ====== Dialog ======
  const dialog = document.getElementById('class-dialog');
  const dialogForm = document.getElementById('class-form');
  const dialogDelete = document.getElementById('dialog-delete');
  const dialogTitle = document.getElementById('dialog-title');
  let editingId = null;

  function openClassDialog(id, defaults = {}) {
    editingId = id;
    // populate period options
    const periodSel = dialogForm.period;
    periodSel.innerHTML = state.periods.map(p => `<option value="${p.id}">${p.id}限 (${p.start}〜${p.end})</option>`).join('');
    if (id) {
      const c = state.classes.find(x => x.id === id);
      if (!c) return;
      dialogTitle.textContent = '講義を編集';
      dialogForm.name.value = c.name;
      dialogForm.day.value = String(c.day);
      dialogForm.period.value = String(c.period);
      dialogForm.room.value = c.room;
      dialogDelete.hidden = false;
    } else {
      dialogTitle.textContent = '講義を追加';
      dialogForm.reset();
      if (defaults.day != null) dialogForm.day.value = String(defaults.day);
      if (defaults.period != null) dialogForm.period.value = String(defaults.period);
      dialogDelete.hidden = true;
    }
    dialog.showModal();
  }
  dialogForm.addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(dialogForm);
    const payload = {
      name: fd.get('name').trim(),
      day: Number(fd.get('day')),
      period: Number(fd.get('period')),
      room: fd.get('room').trim(),
    };
    if (!payload.name) return;
    if (editingId) {
      const i = state.classes.findIndex(c => c.id === editingId);
      if (i >= 0) state.classes[i] = { ...state.classes[i], ...payload };
    } else {
      state.classes.push({ id: uid(), ...payload });
    }
    saveState();
    dialog.close();
    renderAll();
  });
  document.getElementById('dialog-cancel').addEventListener('click', () => dialog.close());
  dialogDelete.addEventListener('click', () => {
    if (!editingId) return;
    if (!confirm('この講義を削除しますか？')) return;
    state.classes = state.classes.filter(c => c.id !== editingId);
    saveState();
    dialog.close();
    renderAll();
  });

  // ====== Tabs ======
  function switchTab(name) {
    document.querySelectorAll('.tabs button').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === name);
    });
    for (const t of ['today', 'week', 'settings']) {
      document.getElementById('tab-' + t).hidden = (t !== name);
    }
  }
  window.switchTab = switchTab;
  document.querySelectorAll('.tabs button').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });

  function renderAll() { renderToday(); renderWeek(); renderSettings(); }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function tickClock() {
    const n = new Date();
    const pad = x => String(x).padStart(2, '0');
    document.getElementById('clock').textContent =
      `${DAY_NAMES[n.getDay()]} ${pad(n.getHours())}:${pad(n.getMinutes())}`;
  }

  // ====== XLSX Import ======
  const SHEETJS_URL = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.mini.min.js';
  let sheetJSLoader = null;
  function loadSheetJS() {
    if (window.XLSX) return Promise.resolve();
    if (sheetJSLoader) return sheetJSLoader;
    sheetJSLoader = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = SHEETJS_URL;
      s.onload = resolve;
      s.onerror = () => reject(new Error('SheetJSの読み込みに失敗しました'));
      document.head.appendChild(s);
    });
    return sheetJSLoader;
  }

  function zenToHanDigits(s) {
    return String(s).replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  }

  function parseClassBlock(lines) {
    const ROOM_TYPE_RE = /(講義室|演習室|実験室|教室|製図室|研究室|実習室)/;
    const ROOM_NUM_RE = /([０-９0-9]{3,5})(?=講義室|演習室|実験室|教室|製図室|研究室|実習室)/;
    const CAMPUS_RE = /キャンパ/;
    let roomIdx = -1, campusIdx = -1;
    for (let i = 0; i < lines.length; i++) {
      if (roomIdx < 0 && ROOM_TYPE_RE.test(lines[i])) roomIdx = i;
      if (campusIdx < 0 && CAMPUS_RE.test(lines[i])) campusIdx = i;
    }
    let metaStart = lines.length;
    if (roomIdx >= 0) metaStart = Math.min(metaStart, roomIdx);
    if (campusIdx >= 0) metaStart = Math.min(metaStart, campusIdx);
    if (metaStart < 2) return null;

    let room = '';
    if (roomIdx >= 0) {
      const m = lines[roomIdx].match(ROOM_NUM_RE);
      if (m) room = zenToHanDigits(m[1]);
    }
    const teacher = lines[metaStart - 1].trim();
    const nameSlice = lines.slice(0, metaStart - 1);
    const nameJoined = nameSlice.join('');
    const firstSpace = nameJoined.search(/[\s　]/);
    const name = (firstSpace >= 0 ? nameJoined.slice(0, firstSpace) : nameJoined).trim();
    if (!name) return null;
    return { name, teacher, room };
  }

  function parseTimetableSheet(ws) {
    const DAY_COLS = [
      { col: 'O',  day: 1 },
      { col: 'AJ', day: 2 },
      { col: 'BE', day: 3 },
      { col: 'BZ', day: 4 },
      { col: 'CU', day: 5 },
      { col: 'DP', day: 6 },
    ];
    const periodRows = [];
    for (let r = 1; r <= 60; r++) {
      const cell = ws['I' + r];
      if (!cell || cell.v == null) continue;
      const s = String(cell.v).trim();
      if (/^\d+$/.test(s)) {
        const p = parseInt(s, 10);
        if (p >= 1 && p <= 10) periodRows.push({ period: p, row: r });
      }
    }
    periodRows.sort((a, b) => a.row - b.row);

    const classes = [];
    for (let i = 0; i < periodRows.length; i++) {
      const { period, row: startRow } = periodRows[i];
      const endRow = (i + 1 < periodRows.length) ? periodRows[i + 1].row - 1 : startRow + 10;
      for (const { col, day } of DAY_COLS) {
        const lines = [];
        for (let r = startRow; r <= endRow; r++) {
          const cell = ws[col + r];
          if (!cell || cell.v == null) continue;
          const s = String(cell.v);
          if (s.trim()) lines.push(s);
        }
        if (!lines.length) continue;
        const parsed = parseClassBlock(lines);
        if (parsed) classes.push({ ...parsed, day, period });
      }
    }
    return classes;
  }

  function dedupeClasses(list) {
    const seen = new Map();
    for (const c of list) {
      const key = `${c.day}-${c.period}`;
      if (!seen.has(key)) seen.set(key, c);
    }
    return Array.from(seen.values());
  }

  async function parseXlsxFile(file) {
    await loadSheetJS();
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const termClasses = { front: [], back: [] };
    for (const name of wb.SheetNames) {
      const ws = wb.Sheets[name];
      const termCell = ws['I6'];
      const termStr = termCell && termCell.v != null ? String(termCell.v) : '';
      const bucket = termStr.includes('後期') ? 'back' : termStr.includes('前期') ? 'front' : null;
      if (!bucket) continue;
      termClasses[bucket].push(...parseTimetableSheet(ws));
    }
    return {
      front: dedupeClasses(termClasses.front),
      back: dedupeClasses(termClasses.back),
    };
  }

  const importDialog = document.getElementById('import-dialog');
  const importFile = document.getElementById('import-file');
  const importResult = document.getElementById('import-result');
  const importError = document.getElementById('import-error');
  const importConfirm = document.getElementById('import-confirm');
  let importParsed = null;

  function openImportDialog() {
    importParsed = null;
    importFile.value = '';
    importResult.hidden = true;
    importError.hidden = true;
    importError.textContent = '';
    importConfirm.disabled = true;
    importDialog.showModal();
  }

  importFile.addEventListener('change', async () => {
    const f = importFile.files[0];
    if (!f) return;
    importError.hidden = true;
    importResult.hidden = true;
    importConfirm.disabled = true;
    try {
      const parsed = await parseXlsxFile(f);
      importParsed = parsed;
      document.getElementById('front-count').textContent = parsed.front.length + ' 件';
      document.getElementById('back-count').textContent = parsed.back.length + ' 件';
      importResult.hidden = false;
      importConfirm.disabled = (parsed.front.length + parsed.back.length) === 0;
      if (importConfirm.disabled) {
        importError.textContent = '講義を認識できませんでした。ファイル形式をご確認ください。';
        importError.hidden = false;
      }
    } catch (e) {
      importError.textContent = '読み込みエラー: ' + (e.message || e);
      importError.hidden = false;
    }
  });

  document.getElementById('import-cancel').addEventListener('click', () => importDialog.close());
  importConfirm.addEventListener('click', () => {
    if (!importParsed) return;
    const term = document.querySelector('input[name=term]:checked').value;
    const source = importParsed[term] || [];
    if (!source.length) return;
    if (!confirm(`${term === 'front' ? '前期' : '後期'} ${source.length}件をインポートし、現在の時間割を置き換えます。よろしいですか？`)) return;
    state.classes = source.map(c => ({ id: uid(), name: c.name, day: c.day, period: c.period, room: c.room }));
    if (source.some(c => c.day === 6)) state.showSaturday = true;
    saveState();
    importDialog.close();
    renderAll();
    switchTab('week');
  });

  renderAll();
  tickClock();
  setInterval(() => { tickClock(); renderToday(); }, 30000);
</script>
</body>
</html>
