<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1e3a8a">
<title>出席クイック</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #334155;
    --accent: #3b82f6;
    --accent-strong: #2563eb;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --ok: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    max-width: 720px; margin: 0 auto;
  }
  header {
    padding: 20px 20px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  h1 { font-size: 20px; margin: 0; letter-spacing: 0.02em; }
  .tabs {
    display: flex; gap: 4px; padding: 0 16px 12px;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .tabs button {
    flex: 1; padding: 10px 0;
    background: var(--panel); color: var(--muted);
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .tabs button.active { background: var(--accent); color: white; }
  main { padding: 4px 16px 80px; }

  .card {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .now-card {
    background: linear-gradient(135deg, var(--accent-strong), #4f46e5);
    padding: 20px;
  }
  .now-label {
    font-size: 12px; opacity: 0.85;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .now-title { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
  .now-meta { font-size: 13px; opacity: 0.85; margin-bottom: 16px; }
  .big-btn {
    display: block; width: 100%;
    background: white; color: var(--accent-strong);
    padding: 18px; border-radius: 12px;
    text-align: center; text-decoration: none;
    font-size: 17px; font-weight: 700;
    border: none; cursor: pointer;
    transition: transform 0.08s;
  }
  .big-btn:active { transform: scale(0.98); }

  .empty {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }

  .list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px; background: var(--panel);
    border-radius: var(--radius); margin-bottom: 8px;
    text-decoration: none; color: var(--text);
  }
  .list-item.past { opacity: 0.5; }
  .list-item.current { border: 2px solid var(--accent); }
  .list-period {
    background: var(--panel-2);
    width: 48px; height: 48px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; flex-shrink: 0;
  }
  .list-main { flex: 1; min-width: 0; }
  .list-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sub { font-size: 12px; color: var(--muted); }
  .list-link {
    background: var(--accent); color: white;
    padding: 8px 12px; border-radius: 8px;
    text-decoration: none; font-size: 13px; font-weight: 600;
    white-space: nowrap;
  }

  .section-title {
    font-size: 13px; font-weight: 600; color: var(--muted);
    margin: 16px 4px 8px; text-transform: uppercase; letter-spacing: 0.08em;
  }

  .grid {
    display: grid;
    gap: 4px;
  }
  .grid .head {
    text-align: center; font-size: 12px; color: var(--muted);
    padding: 6px 0; font-weight: 600;
  }
  .grid .cell {
    background: var(--panel); border-radius: 8px;
    padding: 6px 3px; min-height: 52px;
    font-size: 11px; text-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text); border: none; cursor: pointer;
  }
  .grid .cell.filled { background: var(--accent-strong); color: white; }
  .grid .cell.empty-cell { background: var(--panel); color: var(--muted); font-size: 18px; }
  .grid .cell-name { font-weight: 600; line-height: 1.2; word-break: break-all; }
  .grid .cell-room { font-size: 10px; opacity: 0.8; margin-top: 2px; }

  form { display: flex; flex-direction: column; gap: 10px; }
  label { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
  input, select {
    width: 100%; padding: 12px; border-radius: 10px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid transparent; font-size: 15px;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn {
    padding: 12px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    background: var(--accent); color: white;
  }
  .btn.secondary { background: var(--panel-2); color: var(--text); }
  .btn.danger { background: var(--danger); color: white; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row > * { flex: 1; }

  dialog {
    background: var(--panel); color: var(--text);
    border: none; border-radius: var(--radius);
    padding: 20px;
    width: min(400px, 92vw);
    max-width: 92vw;
    overflow: hidden;
  }
  dialog::backdrop { background: rgba(0,0,0,0.6); }
  dialog h2 { margin: 0 0 14px; font-size: 18px; }
  .term-btn {
    display: block; width: 100%; text-align: left;
    padding: 14px 16px; border-radius: 10px; border: none;
    background: var(--accent); color: white;
    font-size: 15px; font-weight: 600; cursor: pointer;
    margin-bottom: 8px; transition: opacity 0.15s;
  }
  .term-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .term-btn.secondary { background: var(--panel-2); color: var(--muted); }
  .term-btn-sub { font-size: 12px; font-weight: 400; opacity: 0.85; margin-top: 3px; }

  .period-row {
    display: grid; grid-template-columns: 30px 1fr 1fr;
    gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .period-row span { color: var(--muted); font-size: 14px; text-align: center; }

  .footer-note {
    text-align: center; color: var(--muted);
    font-size: 11px; margin-top: 24px; padding: 12px;
  }
  a { color: var(--accent); }

  /* Onboarding */
  #ob-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg); overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .ob-inner {
    max-width: 500px; width: 100%; margin: 0 auto;
    padding: env(safe-area-inset-top, 20px) 20px calc(env(safe-area-inset-bottom, 0px) + 24px);
    min-height: 100dvh; display: flex; flex-direction: column;
  }
  .ob-dots {
    display: flex; gap: 8px; justify-content: center;
    padding: 20px 0 28px; flex-shrink: 0;
  }
  .ob-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--panel-2); transition: all 0.25s;
  }
  .ob-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
  #ob-content { flex: 1; }
  .ob-footer { display: flex; gap: 10px; margin-top: 24px; flex-shrink: 0; }
  .ob-step {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--panel-2); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px;
    font-size: 14px; line-height: 1.5;
  }
  .ob-step-num {
    background: var(--accent); color: white; border-radius: 50%;
    width: 24px; height: 24px; min-width: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .ob-block {
    border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    font-size: 13px; line-height: 1.65;
  }
  .ob-block.warn { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); }
  .ob-block.info { background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.25); }
  .ob-block.ok   { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25); }
</style>
</head>
<body>
<header>
  <h1>出席クイック</h1>
  <span id="clock" style="font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;"></span>
</header>
<nav class="tabs">
  <button data-tab="today" class="active">今日</button>
  <button data-tab="week">時間割</button>
  <button data-tab="settings">設定</button>
</nav>
<main>
  <section id="tab-today"></section>
  <section id="tab-week" hidden></section>
  <section id="tab-settings" hidden></section>
</main>

<div id="ob-overlay" hidden>
  <div class="ob-inner">
    <div id="ob-dots" class="ob-dots"></div>
    <div id="ob-content"></div>
    <div class="ob-footer">
      <button id="ob-prev" class="btn secondary" style="flex:0 0 80px;">← 戻る</button>
      <button id="ob-next" class="btn" style="flex:1;">次へ →</button>
    </div>
  </div>
</div>

<dialog id="import-dialog">
  <h2>Excelからインポート</h2>
  <p style="color:var(--muted);font-size:13px;margin:0 0 12px;">
    千葉工大の学生時間割表（.xlsx）を読み込みます。
  </p>
  <input type="file" id="import-file" accept=".xlsx" style="margin-bottom:12px;width:100%;">
  <div id="import-result" hidden>
    <div style="font-size:12px;color:var(--warn);margin-bottom:10px;">⚠ 既存の時間割を置き換えます</div>
    <button class="term-btn" id="import-front-btn" disabled>
      前期をインポート
      <div class="term-btn-sub" id="front-count">読み込み中…</div>
    </button>
    <button class="term-btn secondary" id="import-back-btn" disabled>
      後期をインポート
      <div class="term-btn-sub" id="back-count">読み込み中…</div>
    </button>
  </div>
  <div id="import-error" style="color:var(--danger);font-size:13px;margin:8px 0 4px;" hidden></div>
  <button type="button" class="btn secondary" id="import-cancel" style="width:100%;margin-top:8px;">閉じる</button>
</dialog>

<dialog id="issues-dialog">
  <h2>取込時の警告</h2>
  <p style="color:var(--muted);font-size:13px;margin:0 0 10px;">
    以下の講義は自動認識できませんでした。設定画面から手動で追加・修正してください。
  </p>
  <div id="issues-list" style="max-height:55vh;overflow-y:auto;margin-bottom:12px;"></div>
  <div class="btn-row">
    <button type="button" class="btn" id="issues-close">閉じる</button>
  </div>
</dialog>

<dialog id="class-dialog">
  <h2 id="dialog-title">講義を追加</h2>
  <form id="class-form">
    <label>講義名
      <input type="text" name="name" required maxlength="40" placeholder="例: プログラミング基礎">
    </label>
    <label>曜日
      <select name="day" required>
        <option value="1">月</option>
        <option value="2">火</option>
        <option value="3">水</option>
        <option value="4">木</option>
        <option value="5">金</option>
        <option value="6">土</option>
        <option value="0">日</option>
      </select>
    </label>
    <label>開始時限
      <select name="startPeriod" required></select>
    </label>
    <label>終了時限（連続コマの場合のみ変更）
      <select name="endPeriod" required></select>
    </label>
    <label>教室番号（空欄可 ／ 3桁=津田沼・4桁=新習志野）
      <input type="text" name="room" inputmode="numeric" pattern="\d{3,4}" maxlength="4" placeholder="例: 5202"
        title="3桁または4桁の半角数字で入力してください">
      <div id="room-campus-hint" style="font-size:12px;color:var(--muted);margin-top:4px;min-height:1em;"></div>
    </label>
    <div class="btn-row" style="margin-top:8px;">
      <button type="button" class="btn secondary" id="dialog-cancel">キャンセル</button>
      <button type="button" class="btn danger" id="dialog-delete" hidden>削除</button>
      <button type="submit" class="btn">保存</button>
    </div>
  </form>
</dialog>

<script>
  const ATTENDANCE_URL = 'https://attendance.is.it-chiba.ac.jp/attendance/class_room/';
  const STORAGE_KEY = 'attendance-app-v1';
  const DAY_NAMES = ['日', '月', '火', '水', '木', '金', '土'];
  const DEFAULT_PERIODS = [
    { id: 1, start: '09:00', end: '10:00' },
    { id: 2, start: '10:00', end: '11:00' },
    { id: 3, start: '11:00', end: '12:00' },
    { id: 4, start: '12:00', end: '13:00' },
    { id: 5, start: '13:00', end: '14:00' },
    { id: 6, start: '14:00', end: '15:00' },
    { id: 7, start: '15:00', end: '16:00' },
    { id: 8, start: '16:00', end: '17:00' },
    { id: 9, start: '17:00', end: '18:00' },
    { id: 10, start: '18:00', end: '19:00' },
  ];

  function loadState() {
    let migrated = false;
    const result = { periods: [...DEFAULT_PERIODS], classes: [], showSaturday: false, onboardingDone: false };
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        if (Array.isArray(s.periods) && s.periods.length === 10) result.periods = s.periods;
        else if (Array.isArray(s.periods)) migrated = true;
        if (Array.isArray(s.classes)) result.classes = s.classes;
        if (typeof s.showSaturday === 'boolean') result.showSaturday = s.showSaturday;
        if (typeof s.onboardingDone === 'boolean') result.onboardingDone = s.onboardingDone;
      }
    } catch {}
    if (migrated) localStorage.setItem(STORAGE_KEY, JSON.stringify(result));
    return result;
  }
  function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  let state = loadState();

  function uid() { return Math.random().toString(36).slice(2, 10); }
  function timeToMin(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }
  function nowMin(d = new Date()) { return d.getHours() * 60 + d.getMinutes(); }
  function periodById(id) { return state.periods.find(p => p.id === id); }

  function normalizeRoom(raw) {
    if (raw == null) return '';
    const half = String(raw).replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
    return half.replace(/[^0-9]/g, '').slice(0, 4);
  }
  function campusOf(room) {
    const r = String(room || '');
    if (r.length === 4) return '新習志野キャンパス';
    if (r.length === 3) return '津田沼キャンパス';
    return '';
  }
  function fmtRoom(room) {
    if (!room) return '未設定';
    const c = campusOf(room);
    return c ? `${room}（${c}）` : room;
  }

  function dayClassesSorted(day) {
    return state.classes
      .filter(c => c.day === day)
      .map(c => ({ ...c, _p: periodById(c.period) }))
      .filter(c => c._p)
      .sort((a, b) => timeToMin(a._p.start) - timeToMin(b._p.start));
  }
  function mergeConsecutive(list) {
    const merged = [];
    for (const c of list) {
      const last = merged[merged.length - 1];
      if (
        last &&
        last.name === c.name &&
        last.room === c.room &&
        last._endP.id + 1 === c._p.id &&
        timeToMin(last._endP.end) === timeToMin(c._p.start)
      ) {
        last._endP = c._p;
        last.endPeriod = c.period;
        last.periodSpan += 1;
        last.ids.push(c.id);
        continue;
      }
      merged.push({
        ...c,
        startPeriod: c.period,
        endPeriod: c.period,
        _startP: c._p,
        _endP: c._p,
        periodSpan: 1,
        ids: [c.id],
      });
    }
    return merged;
  }
  function todayMergedSorted(date = new Date()) {
    return mergeConsecutive(dayClassesSorted(date.getDay()));
  }
  function findCurrentMerged(date = new Date()) {
    const min = nowMin(date);
    return todayMergedSorted(date).find(m =>
      min >= timeToMin(m._startP.start) && min < timeToMin(m._endP.end)
    ) || null;
  }
  function findNextMerged(date = new Date()) {
    const min = nowMin(date);
    return todayMergedSorted(date).find(m => timeToMin(m._startP.start) > min) || null;
  }
  function periodLabel(m) {
    return m.startPeriod === m.endPeriod ? `${m.startPeriod}限` : `${m.startPeriod}-${m.endPeriod}限`;
  }

  function attendanceLink(room) {
    return ATTENDANCE_URL + encodeURIComponent(room);
  }

  function fmtPeriod(p) { return `${p.id}限 ${p.start}〜${p.end}`; }

  const ATTENDANCE_PRE_MIN = 20;
  const ATTENDANCE_POST_MIN = 60;
  function attendanceWindow(m) {
    const start = timeToMin(m._startP.start);
    return { open: start - ATTENDANCE_PRE_MIN, close: start + ATTENDANCE_POST_MIN };
  }
  function fmtRelMin(min) {
    if (min < 1) return '1分未満';
    if (min < 60) return `${min}分`;
    const h = Math.floor(min / 60);
    const r = min % 60;
    return r ? `${h}時間${r}分` : `${h}時間`;
  }
  function attendanceStatus(m, now = nowMin()) {
    const w = attendanceWindow(m);
    if (now < w.open) return { state: 'pre', msg: `操作可能まであと${fmtRelMin(w.open - now)}` };
    if (now > w.close) return { state: 'post', msg: '操作可能時間を過ぎました' };
    return { state: 'open', msg: `あと${fmtRelMin(w.close - now)}操作可能` };
  }

  // ====== Rendering ======
  function renderToday() {
    const root = document.getElementById('tab-today');
    const current = findCurrentMerged();
    const next = findNextMerged();
    const today = todayMergedSorted();
    const now = new Date();
    const nowM = nowMin(now);

    let html = '';

    function bigBtn(m) {
      if (!m.room) return `<div class="big-btn" style="background:#e5e7eb;color:#6b7280;cursor:not-allowed;">教室番号が未設定です</div>`;
      const st = attendanceStatus(m, nowM);
      if (st.state !== 'open') {
        return `<div class="big-btn" style="background:#e5e7eb;color:#6b7280;cursor:not-allowed;">${st.msg}</div>`;
      }
      return `<a class="big-btn" href="${attendanceLink(m.room)}" target="_blank" rel="noopener">出席サイトを開く →</a>`;
    }
    function statusLine(m) {
      const st = attendanceStatus(m, nowM);
      const color = st.state === 'open' ? '#a7f3d0' : 'rgba(255,255,255,0.7)';
      return `<div style="font-size:12px;color:${color};margin-bottom:10px;">${st.msg}</div>`;
    }

    // 次の講義が20分以内に始まる場合は優先表示
    const nextIsImminent = next && (timeToMin(next._startP.start) - nowM) <= ATTENDANCE_PRE_MIN;

    if (nextIsImminent) {
      html += `
        <div class="card now-card">
          <div class="now-label">次の講義</div>
          <h2 class="now-title">${escapeHtml(next.name)}</h2>
          <div class="now-meta">${periodLabel(next)} ${next._startP.start}〜${next._endP.end} ・ 教室 ${escapeHtml(fmtRoom(next.room))}</div>
          ${statusLine(next)}
          ${bigBtn(next)}
        </div>`;
    } else if (current) {
      html += `
        <div class="card now-card">
          <div class="now-label">今の講義</div>
          <h2 class="now-title">${escapeHtml(current.name)}</h2>
          <div class="now-meta">${periodLabel(current)} ${current._startP.start}〜${current._endP.end} ・ 教室 ${escapeHtml(fmtRoom(current.room))}</div>
          ${statusLine(current)}
          ${bigBtn(current)}
        </div>`;
    } else if (next) {
      html += `
        <div class="card now-card" style="background:linear-gradient(135deg,#475569,#334155);">
          <div class="now-label">次の講義</div>
          <h2 class="now-title">${escapeHtml(next.name)}</h2>
          <div class="now-meta">${periodLabel(next)} ${next._startP.start}〜${next._endP.end} ・ 教室 ${escapeHtml(fmtRoom(next.room))}</div>
          ${statusLine(next)}
          ${bigBtn(next)}
        </div>`;
    } else {
      html += `<div class="card"><div class="empty">${today.length ? '本日の講義は終了しました' : '今日は講義がありません'}</div></div>`;
    }

    html += `<div class="section-title">${DAY_NAMES[now.getDay()]}曜日の時間割</div>`;
    if (today.length === 0) {
      html += `<div class="card"><div class="empty">登録された講義はありません<br><br><a href="#" onclick="switchTab('settings');return false;">設定から追加</a></div></div>`;
    } else {
      html += today.map(m => {
        const pm = timeToMin(m._startP.start);
        const em = timeToMin(m._endP.end);
        let cls = 'list-item';
        if (em <= nowM) cls += ' past';
        else if (pm <= nowM && em > nowM) cls += ' current';
        const st = attendanceStatus(m, nowM);
        let link;
        if (!m.room) {
          link = `<span class="list-link" style="background:var(--panel-2);color:var(--muted);">未設定</span>`;
        } else if (st.state === 'open') {

  function renderWeek() {
    const root = document.getElementById('tab-week');
    const days = state.showSaturday ? [1, 2, 3, 4, 5, 6] : [1, 2, 3, 4, 5];
    const periods = state.periods;

    const dayMerged = {};
    for (const d of days) dayMerged[d] = mergeConsecutive(dayClassesSorted(d));

    const periodIndex = {};
    periods.forEach((p, i) => { periodIndex[p.id] = i; });

    const gridStyle = `grid-template-columns: 40px repeat(${days.length}, 1fr);`;
    let html = `<div class="grid" style="${gridStyle}">`;
    html += `<div class="head" style="grid-row:1;grid-column:1;"></div>`;
    days.forEach((d, di) => {
      html += `<div class="head" style="grid-row:1;grid-column:${di + 2};">${DAY_NAMES[d]}</div>`;
    });
    periods.forEach((p, pi) => {
      html += `<div class="head" style="grid-row:${pi + 2};grid-column:1;">${p.id}</div>`;
    });

    for (const d of days) {
      const di = days.indexOf(d);
      const col = di + 2;
      const covered = new Set();
      for (const m of dayMerged[d]) {
        const startIdx = periodIndex[m.startPeriod];
        if (startIdx == null) continue;

        html += `<button class="cell filled" data-edit="${m.id}" style="grid-row:${row} / span ${m.periodSpan};grid-column:${col};">

          ${m.periodSpan > 1 ? `<div class="cell-room" style="opacity:0.7;">${label}</div>` : ''}

  function openClassDialog(id, defaults = {}) {
    editingId = id;
    populatePeriodOptions();

      const c = state.classes.find(x => x.id === id);
      if (!c) return;
      const siblings = findMergeSiblingIds(c)
        .map(sid => state.classes.find(x => x.id === sid))
        .filter(Boolean)
        .sort((a, b) => a.period - b.period);
      const startP = siblings[0]?.period ?? c.period;

      dialogForm.name.value = c.name;

      dialogDelete.hidden = false;

      dialogForm.reset();
      const defaultPeriod = defaults.period != null ? String(defaults.period) : (state.periods[0]?.id ? String(state.periods[0].id) : '1');
      if (defaults.day != null) dialogForm.day.value = String(defaults.day);

  function findMergeSiblingIds(c) {
    const merged = mergeConsecutive(dayClassesSorted(c.day));

  dialogForm.addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(dialogForm);

      alert('教室番号は3桁または4桁の半角数字で入力してください');

    const name = fd.get('name').trim();
    if (!name) return;
    const day = Number(fd.get('day'));
    let startP = Number(fd.get('startPeriod'));
    let endP = Number(fd.get('endPeriod'));
    if (endP < startP) endP = startP;

    const periodIds = state.periods.map(p => p.id);
    const targetPeriods = periodIds.filter(id => id >= startP && id <= endP);
    if (!targetPeriods.length) return;

    const editingIdSet = new Set();
    if (editingId) {
      const original = state.classes.find(c => c.id === editingId);
      if (original) findMergeSiblingIds(original).forEach(id => editingIdSet.add(id));
    }
    const conflicts = [];
    for (const p of targetPeriods) {
      const occ = state.classes.find(c => c.day === day && c.period === p && !editingIdSet.has(c.id));
      if (occ) conflicts.push(p);
    }
    if (conflicts.length) {
      alert(`${conflicts.join(', ')}限は既に他の講義で使用されています`);
      return;

    if (editingIdSet.size) {
      state.classes = state.classes.filter(c => !editingIdSet.has(c.id));

    for (const p of targetPeriods) {
      state.classes.push({ id: uid(), name, day, period: p, room });

    saveState();
    dialog.close();

  // ====== XLSX Import ======
  const SHEETJS_URL = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.mini.min.js';
  let sheetJSLoader = null;
  function loadSheetJS() {
    if (window.XLSX) return Promise.resolve();
    if (sheetJSLoader) return sheetJSLoader;
    sheetJSLoader = new Promise((resolve, reject) => {
      const s = document.createElement('script');

      document.head.appendChild(s);
    });
    return sheetJSLoader;
  }

  function zenToHanDigits(s) {
    return String(s).replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  }

  function parseClassBlock(lines) {
    const ROOM_TYPE_RE = /(講義室|演習室|実験室|教室|製図室|研究室|実習室|図工室)/;
    const ROOM_NUM_RE = /([０-９0-9]{3,4})(?=講義室|演習室|実験室|教室|製図室|研究室|実習室|図工室)/;
    const CAMPUS_RE = /キャンパ/;
    const BUILDING_RE = /号館|学舎|棟|各科|階/;
    const rawJoined = lines.join(' / ');
    let roomIdx = -1, campusIdx = -1;
    for (let i = 0; i < lines.length; i++) {
      if (roomIdx < 0 && ROOM_TYPE_RE.test(lines[i])) roomIdx = i;
      if (campusIdx < 0 && CAMPUS_RE.test(lines[i])) campusIdx = i;
    }
    let metaStart = lines.length;
    if (roomIdx >= 0) metaStart = Math.min(metaStart, roomIdx);
    if (campusIdx >= 0) metaStart = Math.min(metaStart, campusIdx);
    if (roomIdx < 0 && campusIdx < 0) {
      return { ok: false, reason: '教室・キャンパス情報を認識できません', raw: rawJoined };
    }
    if (metaStart < 2) {
      return { ok: false, reason: 'ブロック構造を解析できません', raw: rawJoined };
    }

    let teacherIdx = metaStart - 1;
    while (teacherIdx > 0 && BUILDING_RE.test(lines[teacherIdx])) teacherIdx--;
    const teacher = (lines[teacherIdx] || '').trim();
    const nameSlice = lines.slice(0, teacherIdx);
    const nameJoined = nameSlice.join('');
    const firstSpace = nameJoined.search(/[\s　]/);
    const name = (firstSpace >= 0 ? nameJoined.slice(0, firstSpace) : nameJoined).trim();
    if (!name) {
      return { ok: false, reason: '講義名を特定できません', raw: rawJoined };
    }

    let room = '';
    if (roomIdx >= 0) {
      const searchStr = lines.slice(Math.max(0, roomIdx - 1), roomIdx + 1).join('');
      const m = searchStr.match(ROOM_NUM_RE);
      if (m) room = zenToHanDigits(m[1]);
    }
    const result = { ok: true, classDef: { name, teacher, room } };
    if (!room) result.warning = '教室番号を検出できません（手動設定が必要）';
    return result;
  }

  function parseTimetableSheet(ws) {
    const DAY_COLS = [
      { col: 'O',  day: 1 },
      { col: 'AJ', day: 2 },
      { col: 'BE', day: 3 },
      { col: 'BZ', day: 4 },
      { col: 'CU', day: 5 },
      { col: 'DP', day: 6 },
    ];
    const periodRows = [];
    for (let r = 1; r <= 60; r++) {
      const cell = ws['I' + r];
      if (!cell || cell.v == null) continue;
      const s = String(cell.v).trim();
      if (/^\d+$/.test(s)) {
        const p = parseInt(s, 10);
        if (p >= 1 && p <= 10) periodRows.push({ period: p, row: r });
      }
    }
    periodRows.sort((a, b) => a.row - b.row);

    const classes = [];
    const issues = [];
    for (let i = 0; i < periodRows.length; i++) {
      const { period, row: startRow } = periodRows[i];
      const endRow = (i + 1 < periodRows.length) ? periodRows[i + 1].row - 1 : startRow + 10;
      for (const { col, day } of DAY_COLS) {
        const lines = [];
        for (let r = startRow; r <= endRow; r++) {
          const cell = ws[col + r];
          if (!cell || cell.v == null) continue;
          const s = String(cell.v);
          if (s.trim()) lines.push(s);
        }
        if (!lines.length) continue;
        const parsed = parseClassBlock(lines);
        if (parsed.ok) {
          classes.push({ ...parsed.classDef, day, period });
          if (parsed.warning) issues.push({ day, period, reason: parsed.warning, raw: lines.join(' / '), name: parsed.classDef.name });
        } else {
          issues.push({ day, period, reason: parsed.reason, raw: parsed.raw, name: '' });
        }
      }
    }
    return { classes, issues };
  }

  function dedupeClasses(list) {
    const seen = new Map();
    for (const c of list) {
      const key = `${c.day}-${c.period}`;
      if (!seen.has(key)) seen.set(key, c);
    }
    return Array.from(seen.values());
  }

  async function parseXlsxFile(file) {
    await loadSheetJS();
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const termData = { front: { classes: [], issues: [] }, back: { classes: [], issues: [] } };
    for (const name of wb.SheetNames) {
      const ws = wb.Sheets[name];
      const termCell = ws['I6'];
      const termStr = termCell && termCell.v != null ? String(termCell.v) : '';
      const bucket = termStr.includes('後期') ? 'back' : termStr.includes('前期') ? 'front' : null;
      if (!bucket) continue;
      const { classes, issues } = parseTimetableSheet(ws);
      termData[bucket].classes.push(...classes);
      termData[bucket].issues.push(...issues);
    }
    return {
      front: { classes: dedupeClasses(termData.front.classes), issues: termData.front.issues },
      back: { classes: dedupeClasses(termData.back.classes), issues: termData.back.issues },
    };
  }

  function fmtCount(term) {

  function showIssues(issues) {
    if (!issues || !issues.length) return;
    issuesList.innerHTML = issues.map(it => `
      <div class="card" style="background:var(--panel-2);margin-bottom:8px;padding:10px;">
        <div style="font-weight:600;margin-bottom:4px;">
          ${DAY_NAMES[it.day]}曜 ${it.period}限${it.name ? ' ・ ' + escapeHtml(it.name) : ''}
        </div>
        <div style="color:var(--warn);font-size:13px;margin-bottom:4px;">${escapeHtml(it.reason)}</div>
        <div style="color:var(--muted);font-size:12px;word-break:break-all;">${escapeHtml(it.raw)}</div>
      </div>
    `).join('');
    issuesDialog.showModal();
  }

  function doImport(termKey) {
    if (!importParsed) return;
    const termData = importParsed[termKey];
    if (!termData || !termData.classes.length) return;
    const label = termKey === 'front' ? '前期' : '後期';
    if (!confirm(`${label} ${termData.classes.length}件をインポートし、現在の時間割を置き換えます。よろしいですか？`)) return;
    state.classes = termData.classes.map(c => ({ id: uid(), name: c.name, day: c.day, period: c.period, room: c.room }));
    if (termData.classes.some(c => c.day === 6)) state.showSaturday = true;
    saveState();
    importDialog.close();
    renderAll();
    switchTab('week');
    if (termData.issues && termData.issues.filter(i => !i.name).length) showIssues(termData.issues);
  }

  importFrontBtn.addEventListener('click', () => doImport('front'));
  importBackBtn.addEventListener('click', () => doImport('back'));

  // ====== Onboarding ======
  const OB_BUG_FORM_URL = 'https://forms.gle/xmWYexzcaQeQ48kK8';

  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches || !!navigator.standalone;
  }

  let obPages = [], obCurrent = 0;

  function startOnboarding(force = false) {
    obPages = [];
    if (!isStandalone()) obPages.push('install');
    obPages.push('disclaimer', 'import', 'bugreport');
    obCurrent = 0;
    renderObPage();
    document.getElementById('ob-overlay').hidden = false;
    if (force) { state.onboardingDone = false; saveState(); }
  }

  function obNext() {
    if (obCurrent < obPages.length - 1) { obCurrent++; renderObPage(); }
    else closeOnboarding();
  }
  function obPrev() {
    if (obCurrent > 0) { obCurrent--; renderObPage(); }
  }
  function closeOnboarding() {
    document.getElementById('ob-overlay').hidden = true;
    state.onboardingDone = true;
    saveState();
  }

  function getObHtml(page) {
    if (page === 'install') return `
      <h2 style="font-size:22px;font-weight:700;margin:0 0 8px;line-height:1.3;">ホーム画面に<br>追加してください</h2>
      <p style="color:var(--muted);font-size:14px;margin:0 0 24px;line-height:1.6;">
        Safariのホーム画面に追加すると、アプリとして快適に使えます。
      </p>
      <div class="ob-step">
        <div class="ob-step-num">1</div>
        <div>画面下部の<strong>共有ボタン（□↑）</strong>をタップ</div>
      </div>
      <div class="ob-step">
        <div class="ob-step-num">2</div>
        <div>メニューを下にスクロールして<strong>「ホーム画面に追加」</strong>をタップ</div>
      </div>
      <div class="ob-step">
        <div class="ob-step-num">3</div>
        <div>右上の<strong>「追加」</strong>をタップして完了</div>
      </div>
      <div class="ob-block info" style="margin-top:16px;">
        📱 ホーム画面のアイコンから起動するとフルスクリーンで動作します。<br>すでに追加済みの場合はそのまま「次へ」を押してください。
      </div>`;

    if (page === 'disclaimer') return `
      <h2 style="font-size:20px;font-weight:700;margin:0 0 16px;">使用上の注意・免責事項</h2>
      <div class="ob-block info">📋 このアプリは、出席登録のQRコード読み込みを省略する<strong>ショートカットツール</strong>です。</div>
      <div class="ob-block warn">📶 <strong>学内Wi-Fi（CIT_Wi-Fi）に接続していないと出席サイトは機能しません。</strong>必ず接続した状態でご使用ください。</div>
      <div class="ob-block warn">⚠️ このアプリは毎回の出席操作の手間を減らす目的であり、<strong>不正な出席登録を推奨するものではありません。</strong></div>
      <div class="ob-block warn">❌ このアプリの使用による出欠・成績・その他大学からの不利益について、<strong>開発者は一切の責任を負いません。</strong></div>
      <div class="ob-block ok">🔒 時間割データは<strong>端末内のみ</strong>に保存され、開発者を含む第三者は閲覧できません。</div>
      <div class="ob-block warn">🗑️ ブラウザのデータ消去・再インストールで<strong>時間割データは消滅します。</strong>設定画面からエクスポートして定期バックアップを推奨します。</div>`;

    if (page === 'import') return `
      <h2 style="font-size:20px;font-weight:700;margin:0 0 8px;">時間割を取り込む</h2>
      <p style="color:var(--muted);font-size:13px;margin:0 0 14px;line-height:1.6;">
        CITポータル（PC版）の「授業・出席」→「時間割照会」からダウンロードできる
        <strong>学生時間割表（.xlsx）</strong>を読み込めます。
      </p>
      <div class="ob-block warn" style="margin-bottom:10px;">
        ⚠️ <strong>一部の授業は教室番号が自動取得できません</strong>（例: 初年次教育 / 12号館6階各科共用製図室）。<br>
        その場合は教室に貼られているQRコードの下に記載の<strong>4桁の番号</strong>を後から手動登録してください。
      </div>
      <div class="ob-block info" style="margin-bottom:16px;">
        🔄 学期が変わると教室番号が変わる場合があります。後期開始時に再インポートを推奨します。
      </div>
      <label style="display:block;margin-bottom:6px;color:var(--muted);font-size:13px;">Excelファイルを選択（.xlsx）</label>
      <input type="file" id="ob-xlsx-input" accept=".xlsx" style="width:100%;margin-bottom:10px;">
      <div id="ob-import-msg" style="font-size:13px;min-height:18px;margin-bottom:10px;"></div>
      <div id="ob-import-btns" hidden style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn" id="ob-front-btn" disabled></button>
        <button class="btn secondary" id="ob-back-btn" disabled></button>
      </div>
      <p style="color:var(--muted);font-size:12px;margin-top:14px;">後で取り込む場合はスキップしてください。設定タブからいつでもインポートできます。</p>`;

    if (page === 'bugreport') return `
      <h2 style="font-size:20px;font-weight:700;margin:0 0 12px;">バグ報告のお願い</h2>
      <div class="ob-block warn">🚧 このアプリはまだ<strong>プレリリース段階</strong>のため、予期せぬバグが発生する場合があります。</div>
      <p style="font-size:14px;line-height:1.7;margin:16px 0;">
        バグを発見した際は、以下のフォームから<strong>工大メールアドレス</strong>で報告いただけると助かります（任意）。
      </p>
      <a href="${OB_BUG_FORM_URL}" target="_blank" rel="noopener"
         class="btn" style="display:block;text-align:center;text-decoration:none;margin-bottom:20px;">
        バグ報告フォームを開く →
      </a>
      <div class="ob-block ok">
        ご協力ありがとうございます。いただいた報告はアプリの改善に活用させていただきます。
      </div>
      <p style="color:var(--muted);font-size:12px;margin-top:16px;line-height:1.6;">
        「はじめる」をタップするとアプリが起動します。
      </p>`;

    return '';
  }

  function renderObPage() {
    const page = obPages[obCurrent];
    const isFirst = obCurrent === 0;
    const isLast = obCurrent === obPages.length - 1;

    document.getElementById('ob-dots').innerHTML = obPages.map((_, i) =>
      `<div class="ob-dot${i === obCurrent ? ' active' : ''}"></div>`
    ).join('');
    document.getElementById('ob-content').innerHTML = getObHtml(page);
    document.getElementById('ob-prev').hidden = isFirst;
    document.getElementById('ob-next').textContent = isLast ? 'はじめる ✓' : '次へ →';

    if (page === 'import') wireObImport();
  }

  function wireObImport() {
    let obParsed = null;
    const msg = document.getElementById('ob-import-msg');
    const btns = document.getElementById('ob-import-btns');
    const frontBtn = document.getElementById('ob-front-btn');
    const backBtn = document.getElementById('ob-back-btn');

    document.getElementById('ob-xlsx-input').addEventListener('change', async (e) => {
      const f = e.target.files[0]; if (!f) return;
      msg.style.color = 'var(--muted)'; msg.textContent = '読み込み中…';
      btns.hidden = true;
      try {
        obParsed = await parseXlsxFile(f);
        frontBtn.textContent = `前期をインポート（${obParsed.front.classes.length}件）`;
        backBtn.textContent = `後期をインポート（${obParsed.back.classes.length}件）`;
        frontBtn.disabled = obParsed.front.classes.length === 0;
        backBtn.disabled = obParsed.back.classes.length === 0;
        btns.hidden = false;
        msg.style.color = 'var(--ok)'; msg.textContent = '✓ ファイルを読み込みました';
      } catch (err) {
        msg.style.color = 'var(--danger)';
        msg.textContent = '読み込み失敗: ' + (err.message || err);
      }
    });

    function doObImport(key) {
      if (!obParsed) return;
      const td = obParsed[key];
      if (!td?.classes?.length) return;
      state.classes = td.classes.map(c => ({ id: uid(), name: c.name, day: c.day, period: c.period, room: c.room }));
      if (td.classes.some(c => c.day === 6)) state.showSaturday = true;
      saveState(); renderAll();
      const label = key === 'front' ? '前期' : '後期';
      msg.style.color = 'var(--ok)';
      msg.textContent = `✓ ${label} ${td.classes.length}件をインポートしました`;
      btns.hidden = true;
    }
    frontBtn.addEventListener('click', () => doObImport('front'));
    backBtn.addEventListener('click', () => doObImport('back'));
  }

  document.getElementById('ob-next').addEventListener('click', obNext);
  document.getElementById('ob-prev').addEventListener('click', obPrev);

  renderAll();
  tickClock();
  setInterval(() => { tickClock(); renderToday(); }, 30000);
  if (!state.onboardingDone) startOnboarding();
</script>
</body>
</html>
